name: "Grid Service CI"

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'services/grid-service/**'
      - 'tools/load-testing/**'
      - 'go.mod'
      - 'go.sum'
  push:
    branches:
      - main
    paths:
      - 'services/grid-service/**'
      - 'tools/load-testing/**'
      - '.github/workflows/ci-grid-service.yml'
      - 'go.mod'
      - 'go.sum'

jobs:
  test-go:
    name: "Test & Lint (Go)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./services/grid-service

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version: '1.21'
          cache-dependency-path: services/grid-service/go.sum

      - name: Install Dependencies
        run: go mod download

      - name: Run Linter (golangci-lint)
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          working-directory: services/grid-service
          args: --timeout=5m

      - name: Run Unit Tests
        run: go test -race -v ./...

  integration-docker:
    name: "Docker Build & Integration (Grid Service)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./services/grid-service

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version: '1.21'
          cache-dependency-path: services/grid-service/go.sum

      - name: Build and Start Dependencies (Docker Compose)
        run: docker compose up -d --build

      - name: Wait for Healthy Dependencies
        run: |
          for i in {1..30}; do
            POSTGRES_HEALTH=$(docker inspect --format='{{json .State.Health.Status}}' gridservice-postgres || echo '"unknown"')
            REDIS_HEALTH=$(docker inspect --format='{{json .State.Health.Status}}' gridservice-redis || echo '"unknown"')
            echo "Postgres health: $POSTGRES_HEALTH"
            echo "Redis health: $REDIS_HEALTH"

            if [[ "$POSTGRES_HEALTH" == '"healthy"' && "$REDIS_HEALTH" == '"healthy"' ]]; then
              exit 0
            fi

            sleep 5
          done

          echo "Dependencies did not become healthy in time"
          docker compose ps
          exit 1

      - name: Run Embedded Migrations
        env:
          DATABASE_URL: postgres://quantatomai:quantatomai@localhost:55432/quantatomai?sslmode=disable
        run: go run ./src -migrate-only

      - name: Run Phase 2 Tenant Control Plane Integration Test
        env:
          DATABASE_URL: postgres://quantatomai:quantatomai@localhost:55432/quantatomai?sslmode=disable
        run: go test -timeout 180s -run TestRun_Phase2TenantControlPlane -v ./sql/schema

      - name: Show Container Logs on Failure
        if: failure()
        run: docker compose logs --no-color

      - name: Tear Down Dependencies
        if: always()
        run: docker compose down -v

  phase4-fixture-smoke:
    name: "Phase 4 Fixture Smoke (${{ matrix.profile }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
          profile: ["B", "C", "D"]
    defaults:
      run:
        working-directory: ./services/grid-service
    env:
      PGPORT: 55432

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version: '1.21'
          cache-dependency-path: services/grid-service/go.sum

      - name: Build and Start Dependencies (Docker Compose)
        run: docker compose up -d --build

      - name: Wait for Healthy Dependencies
        run: |
          for i in {1..30}; do
            POSTGRES_HEALTH=$(docker inspect --format='{{json .State.Health.Status}}' gridservice-postgres || echo '"unknown"')
            REDIS_HEALTH=$(docker inspect --format='{{json .State.Health.Status}}' gridservice-redis || echo '"unknown"')
            echo "Postgres health: $POSTGRES_HEALTH"
            echo "Redis health: $REDIS_HEALTH"

            if [[ "$POSTGRES_HEALTH" == '"healthy"' && "$REDIS_HEALTH" == '"healthy"' ]]; then
              exit 0
            fi

            sleep 5
          done

          echo "Dependencies did not become healthy in time"
          docker compose ps
          exit 1

      - name: Install PostgreSQL Client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Dry Run Phase 4 Fixture Profile
        working-directory: .
        run: pwsh -NoProfile -File tools/load-testing/prepare-grid-service-phase4-fixtures.ps1 -Profile ${{ matrix.profile }} -DryRun

      - name: Apply Phase 4 Fixture Profile
        working-directory: .
        env:
          PGPASSWORD: quantatomai
        run: pwsh -NoProfile -File tools/load-testing/prepare-grid-service-phase4-fixtures.ps1 -Profile ${{ matrix.profile }}

      - name: Validate Phase 4 Fixture Smoke Checks
        env:
          PGPASSWORD: quantatomai
        run: |
          if [[ "${{ matrix.profile }}" == "B" ]]; then
            psql -h localhost -U quantatomai -d quantatomai -v ON_ERROR_STOP=1 -f sql/validation/phase4_planning_workload_smoke_checks.sql
            psql -h localhost -U quantatomai -d quantatomai -v ON_ERROR_STOP=1 -f sql/validation/phase6_consolidation_domain_checks.sql
            psql -h localhost -U quantatomai -d quantatomai -v ON_ERROR_STOP=1 -f sql/validation/phase7_ai_inference_governance_checks.sql
          else
            psql -h localhost -U quantatomai -d quantatomai -v ON_ERROR_STOP=1 -f sql/validation/phase4_fixture_smoke_checks.sql
          fi

      - name: Generate Phase 4 Evidence Bundle
        working-directory: .
        run: |
          pwsh -NoProfile -File tools/load-testing/run-grid-service-phase4.ps1 \
            -Profile ${{ matrix.profile }} \
            -DatabaseBacked

      - name: Upload Evidence Bundle
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: phase4-evidence-${{ matrix.profile }}-${{ github.sha }}
          path: tools/load-testing/results/
          if-no-files-found: warn

      - name: Show Container Logs on Failure
        if: failure()
        run: docker compose logs --no-color

      - name: Tear Down Dependencies
        if: always()
        run: docker compose down -v

  phase4-profile-b-greenpath:
    name: "Phase 4 Profile B Green Path"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./services/grid-service
    env:
      PGPORT: 55432

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version: '1.21'
          cache-dependency-path: services/grid-service/go.sum

      - name: Build and Start Dependencies (Docker Compose)
        run: docker compose up -d --build

      - name: Wait for Healthy Dependencies
        run: |
          for i in {1..30}; do
            POSTGRES_HEALTH=$(docker inspect --format='{{json .State.Health.Status}}' gridservice-postgres || echo '"unknown"')
            REDIS_HEALTH=$(docker inspect --format='{{json .State.Health.Status}}' gridservice-redis || echo '"unknown"')
            echo "Postgres health: $POSTGRES_HEALTH"
            echo "Redis health: $REDIS_HEALTH"

            if [[ "$POSTGRES_HEALTH" == '"healthy"' && "$REDIS_HEALTH" == '"healthy"' ]]; then
              exit 0
            fi

            sleep 5
          done

          echo "Dependencies did not become healthy in time"
          docker compose ps
          exit 1

      - name: Run Profile B End-to-End Green Path
        working-directory: .
        run: |
          pwsh -NoProfile -File tools/load-testing/run-grid-service-phase4.ps1 \
            -Profile B \
            -DatabaseBacked \
            -PrepareFixtures

      - name: Verify Profile B Evidence Contract
        working-directory: .
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $resultsRoot = "tools/load-testing/results"
          $runDir = Get-ChildItem -Path $resultsRoot -Directory -Filter "phase4-b-*" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if ($null -eq $runDir) {
            throw "No Profile B evidence directory found under $resultsRoot"
          }

          $manifestPath = Join-Path $runDir.FullName "run-manifest.json"
          $summaryPath = Join-Path $runDir.FullName "evidence-summary.md"
          $outputPath = Join-Path $runDir.FullName "command-output.txt"

          foreach ($requiredPath in @($manifestPath, $summaryPath, $outputPath)) {
            if (-not (Test-Path $requiredPath)) {
              throw "Missing required evidence file: $requiredPath"
            }
          }

          $manifest = Get-Content -Path $manifestPath -Raw | ConvertFrom-Json
          $requiredManifestFields = @(
            "runId",
            "createdAtUtc",
            "profile",
            "gitHash",
            "tenantCount",
            "durationSeconds",
            "dryRun",
            "command",
            "commandExitCode",
            "commandOutputFile",
            "thresholdEvaluation"
          )

          foreach ($fieldName in $requiredManifestFields) {
            if ($null -eq $manifest.PSObject.Properties[$fieldName]) {
              throw "Manifest missing field: $fieldName"
            }
          }

          if ($manifest.profile.id -ne "B") {
            throw "Expected profile id B but got '$($manifest.profile.id)'"
          }

          if ([int]$manifest.commandExitCode -ne 0) {
            throw "Expected commandExitCode 0 but got $($manifest.commandExitCode)"
          }

          if ([bool]$manifest.dryRun) {
            throw "Green-path evidence must not be a dry run"
          }

          if ([string]::IsNullOrWhiteSpace([string]$manifest.commandOutputFile)) {
            throw "Manifest commandOutputFile must be populated"
          }

          Write-Host "Validated Profile B evidence contract at: $($runDir.FullName)"

      - name: Upload Profile B Evidence Bundle
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: phase4-evidence-B-greenpath-${{ github.sha }}
          path: tools/load-testing/results/phase4-b-*
          if-no-files-found: error

      - name: Show Container Logs on Failure
        if: failure()
        run: docker compose logs --no-color

      - name: Tear Down Dependencies
        if: always()
        run: docker compose down -v
