name: "Grid Service CI"

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'services/grid-service/**'
      - 'tools/load-testing/**'
      - 'go.mod'
      - 'go.sum'
  push:
    branches:
      - main
    paths:
      - 'services/grid-service/**'
      - 'tools/load-testing/**'
      - '.github/workflows/ci-grid-service.yml'
      - 'go.mod'
      - 'go.sum'

jobs:
  test-go:
    name: "Test & Lint (Go)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./services/grid-service

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: services/grid-service/go.sum

      - name: Install Dependencies
        run: go mod download

      - name: Run Linter (golangci-lint)
        uses: golangci/golangci-lint-action@v3
        with:
          version: latest
          working-directory: services/grid-service
          args: --timeout=5m

      - name: Run Unit Tests
        run: go test -race -v ./...

  integration-docker:
    name: "Docker Build & Integration (Grid Service)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./services/grid-service

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: services/grid-service/go.sum

      - name: Build and Start Dependencies (Docker Compose)
        run: docker compose up -d --build

      - name: Wait for Healthy Dependencies
        run: |
          for i in {1..30}; do
            POSTGRES_HEALTH=$(docker inspect --format='{{json .State.Health.Status}}' gridservice-postgres || echo '"unknown"')
            REDIS_HEALTH=$(docker inspect --format='{{json .State.Health.Status}}' gridservice-redis || echo '"unknown"')
            echo "Postgres health: $POSTGRES_HEALTH"
            echo "Redis health: $REDIS_HEALTH"

            if [[ "$POSTGRES_HEALTH" == '"healthy"' && "$REDIS_HEALTH" == '"healthy"' ]]; then
              exit 0
            fi

            sleep 5
          done

          echo "Dependencies did not become healthy in time"
          docker compose ps
          exit 1

      - name: Run Embedded Migrations
        run: go run ./src -migrate-only

      - name: Run Phase 2 Tenant Control Plane Integration Test
        env:
          DATABASE_URL: postgres://quantatomai:quantatomai@localhost:55432/quantatomai?sslmode=disable
        run: go test -timeout 180s -run TestRun_Phase2TenantControlPlane -v ./sql/schema

      - name: Show Container Logs on Failure
        if: failure()
        run: docker compose logs --no-color

      - name: Tear Down Dependencies
        if: always()
        run: docker compose down -v

  phase4-fixture-smoke:
    name: "Phase 4 Fixture Smoke (${{ matrix.profile }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: ["C", "D"]
    defaults:
      run:
        working-directory: ./services/grid-service

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: services/grid-service/go.sum

      - name: Build and Start Dependencies (Docker Compose)
        run: docker compose up -d --build

      - name: Wait for Healthy Dependencies
        run: |
          for i in {1..30}; do
            POSTGRES_HEALTH=$(docker inspect --format='{{json .State.Health.Status}}' gridservice-postgres || echo '"unknown"')
            REDIS_HEALTH=$(docker inspect --format='{{json .State.Health.Status}}' gridservice-redis || echo '"unknown"')
            echo "Postgres health: $POSTGRES_HEALTH"
            echo "Redis health: $REDIS_HEALTH"

            if [[ "$POSTGRES_HEALTH" == '"healthy"' && "$REDIS_HEALTH" == '"healthy"' ]]; then
              exit 0
            fi

            sleep 5
          done

          echo "Dependencies did not become healthy in time"
          docker compose ps
          exit 1

      - name: Install PostgreSQL Client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Dry Run Phase 4 Fixture Profile
        working-directory: .
        run: pwsh -NoProfile -File tools/load-testing/prepare-grid-service-phase4-fixtures.ps1 -Profile ${{ matrix.profile }} -DryRun

      - name: Apply Phase 4 Fixture Profile
        working-directory: .
        env:
          PGPASSWORD: quantatomai
        run: pwsh -NoProfile -File tools/load-testing/prepare-grid-service-phase4-fixtures.ps1 -Profile ${{ matrix.profile }}

      - name: Validate Phase 4 Fixture Smoke Checks
        env:
          PGPASSWORD: quantatomai
        run: psql -h localhost -U quantatomai -d quantatomai -v ON_ERROR_STOP=1 -f sql/validation/phase4_fixture_smoke_checks.sql

      - name: Generate Phase 4 Evidence Bundle
        working-directory: .
        run: |
          pwsh -NoProfile -File tools/load-testing/run-grid-service-phase4.ps1 \
            -Profile ${{ matrix.profile }} \
            -DatabaseBacked

      - name: Upload Evidence Bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase4-evidence-${{ matrix.profile }}-${{ github.sha }}
          path: tools/load-testing/results/
          if-no-files-found: warn

      - name: Show Container Logs on Failure
        if: failure()
        run: docker compose logs --no-color

      - name: Tear Down Dependencies
        if: always()
        run: docker compose down -v
